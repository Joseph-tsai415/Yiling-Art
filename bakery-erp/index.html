<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bakery ERP — 中央倉+多門市</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..40,400,0,0&display=block" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
body{margin:0;font-family:'Noto Sans TC',sans-serif;background:#f7f8fa;color:#1b2330}
@keyframes scrFade{from{opacity:0}to{opacity:1}}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.htop{display:flex;align-items:center;gap:14px;height:50px;padding:0 20px;background:#fff;border-bottom:1px solid #e3e6eb;flex:none}
.hnav{width:186px;flex:none;background:#fff;border-right:1px solid #e3e6eb;padding:14px 10px;display:flex;flex-direction:column;gap:1px;overflow:auto;overflow-x:hidden;transition:width .18s ease}
.hgl{padding:12px 12px 5px;font-size:11px;color:#66707f;letter-spacing:.06em;white-space:nowrap}
.hni{padding:7px 10px;border-radius:8px;color:#1b2330;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;white-space:nowrap}
.msi{font-family:'Material Symbols Outlined';font-weight:400;font-style:normal;font-size:19px;line-height:1;flex:none;color:#66707f;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20}
.hni .lbl{flex:1;overflow:hidden;text-overflow:ellipsis}
.hni:hover{background:#f1f4f6}
.kpi3{flex:1;background:#fff;border:1px solid #e3e6eb;border-radius:10px;padding:14px 16px;box-shadow:0 1px 2px rgba(16,24,40,.06)}
.kpi3 .l{font-size:12px;color:#66707f}
.kpi3 .v{font-size:24px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.kpi3 .d{font-size:11.5px;margin-top:2px;color:#66707f}
.pan{background:#fff;border:1px solid #e3e6eb;border-radius:10px;box-shadow:0 1px 2px rgba(16,24,40,.06);overflow:hidden}
.pah{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid #e3e6eb;font-weight:600}
.t3{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
.t3 th{text-align:left;font-size:11px;font-weight:500;color:#66707f;padding:7px 16px;border-bottom:1px solid #e3e6eb;background:#f4f6f8}
.t3 td{padding:8px 16px;border-bottom:1px solid #eef0f3}
.t3 tr:last-child td{border-bottom:none}
.t3 .num,.t3 th.num{text-align:right}
.tacc th,.tacc td{padding-left:9px;padding-right:9px}
.tag3{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px;border:1px solid;white-space:nowrap}
.btn3{display:inline-block;font-size:12px;font-weight:500;padding:5px 12px;border-radius:8px;background:#0e7490;color:#fff;white-space:nowrap;cursor:pointer;user-select:none}
.btn3:hover{background:#0c6076}
.btn3o{display:inline-block;font-size:12px;font-weight:500;padding:4px 11px;border-radius:8px;border:1px solid #e3e6eb;color:#1b2330;background:#fff;white-space:nowrap;cursor:pointer;user-select:none}
.btn3o:hover{background:#f1f4f6}
.bomdrill:hover{background:#eef6f8}
.bomcrumb:hover{text-decoration:underline}
.bar3{height:6px;border-radius:3px;background:#eef0f3;overflow:hidden;flex:1}
.inp{display:inline-block;padding:5px 10px;border:1px solid #e3e6eb;border-radius:8px;background:#fff;font-size:12.5px;font-variant-numeric:tabular-nums;font-family:'Noto Sans TC',sans-serif;color:#1b2330;box-sizing:border-box}
.seg{display:inline-flex;border:1px solid #e3e6eb;border-radius:8px;overflow:hidden;font-size:12px;background:#fff}
.seg span{padding:4px 12px;border-right:1px solid #e3e6eb;cursor:pointer;user-select:none}
.seg span:last-child{border-right:none}
.task3{border:1px solid #e3e6eb;border-radius:8px;padding:10px 12px;background:#fff;font-size:12.5px;box-shadow:0 1px 2px rgba(16,24,40,.06)}
.grow{position:relative;height:32px;border-bottom:1px solid #eef0f3}
.gspin{width:26px;height:26px;border-radius:50%;border:3px solid #eef0f3;border-top-color:#4285F4;animation:gsp-rot .8s linear infinite,gsp-col 3.2s linear infinite;flex:none}
@keyframes gsp-rot{100%{transform:rotate(360deg)}}
@keyframes gsp-col{0%,100%{border-top-color:#4285F4}25%{border-top-color:#EA4335}50%{border-top-color:#FBBC05}75%{border-top-color:#34A853}}
</style>
</head>
<body>
<div id="app"></div>
<script type="text/x-template" id="app-tpl">

<!-- ═══ 開機 splash 疊層:蓋住載入/驗證,就緒後淡出露出底下畫面 ═══ -->
<sc-if value="{{splashOn}}">
  <div style="position:fixed;inset:0;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:#f6f6eb;transition:opacity .9s ease;animation:scrFade .5s ease;{{splashStyle}}">
    <img src="assets/wordmark-blue.png" alt="Mamalili home&bakery" style="width:240px;max-width:56%;height:auto">
    <div style="display:flex;align-items:center;gap:10px;color:#66707f;font-size:14px"><span class="gspin"></span>載入中…</div>
  </div>
</sc-if>

<!-- ═══ 登入(Google Sign-In;帳號由管理員開通)═══ -->
<sc-if value="{{authLoginOn}}">
  <div style="display:flex;height:100vh;background:#f6f6eb">
    <div style="width:38%;min-width:300px;display:flex;align-items:center;justify-content:center;background:url('assets/background-blue-texture.jpg') center/cover no-repeat">
      <img src="assets/mascot-color.png" alt="Mamalili" style="width:60%;max-width:320px;height:auto;filter:drop-shadow(0 12px 30px rgba(16,24,40,.28))">
    </div>
    <div style="flex:1;display:flex;align-items:center;padding:0 8%">
      <div style="width:340px;display:flex;flex-direction:column">
        <!-- identity block -->
        <div style="padding-bottom:24px;border-bottom:1px solid #e7e3d4">
          <div style="font-size:28px;font-weight:700;letter-spacing:-.01em;color:#1b2330"><span style="color:#5078a0">Bakery</span> ERP</div>
          <div style="color:#66707f;font-size:13.5px;margin-top:6px">中央倉+多門市 烘焙管理系統</div>
        </div>
        <!-- sign-in block -->
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:28px">
          <div ref="{{gsiRef}}" morph-skip style="min-height:44px;{{gsiWrapStyle}}"></div>
          <div style="color:#66707f;font-size:12.5px;line-height:1.5">請使用已開通的 Google 帳戶登入</div>
        </div>
        <div style="{{authBusyStyle}}"><span class="gspin"></span><span>正在驗證你的帳號…</span></div>
        <div style="font-size:12px;color:#9aa1ab;line-height:1.7;margin-top:22px">帳號由系統管理員開通;尚未開通或無法登入,請聯繫管理員。</div>
      </div>
    </div>
  </div>
</sc-if>

<!-- ═══ 已登入但不在名單(封鎖)═══ -->
<sc-if value="{{authBlockedOn}}">
  <div style="display:flex;height:100vh;background:#f6f6eb">
    <div style="width:38%;min-width:300px;display:flex;align-items:center;justify-content:center;background:url('assets/background-blue-texture.jpg') center/cover no-repeat">
      <img src="assets/mascot-color.png" alt="Mamalili" style="width:60%;max-width:320px;height:auto;filter:drop-shadow(0 12px 30px rgba(16,24,40,.28))">
    </div>
    <div style="flex:1;display:flex;align-items:center;padding:0 8%">
      <div style="width:380px;display:flex;flex-direction:column;gap:14px">
        <div style="font-size:26px;font-weight:700">⏳ 此帳號尚未開通</div>
        <div style="font-size:14px;color:#1b2330;background:#f7f8fa;border:1px solid #e3e6eb;border-radius:9px;padding:10px 14px">{{blockedEmail}}</div>
        <div style="color:#66707f;font-size:13px;line-height:1.7">這個 Google 帳號不在使用名單上。請聯繫系統管理員開通後,重新登入即可使用。</div>
        <span class="btn3" style="text-align:center;padding:9px 0" onClick="{{doSwitchAccount}}">換一個帳號登入</span>
      </div>
    </div>
  </div>
</sc-if>

<sc-if value="{{appOn}}">
<div style="display:flex;flex-direction:column;height:100vh;font-size:13px;line-height:1.45">
  <div class="htop">
    <div style="display:flex;align-items:center"><img src="assets/wordmark-blue.png" alt="Mamalili home&bakery" style="height:30px;width:auto;display:block"></div>
    <span class="seg" style="margin-left:4px"><sc-for list="{{locTabs}}" as="lv" hint-placeholder-count="3"><span style="{{lv.style}}" onClick="{{lv.go}}">{{lv.name}}</span></sc-for></span>
    <div style="color:#66707f;font-size:12.5px">{{screenTitle}}</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
      <span style="font-size:12px;color:#66707f" title="版本 __APP_VERSION__">{{nowTxt}}</span>
      <span class="tag3" style="{{connChipStyle}}" onClick="{{goConnect}}">{{connChipTxt}}</span>
      <span class="btn3o" style="{{resetBtnStyle}}" onClick="{{doReset}}">重置示範資料</span>
      <div style="display:flex;align-items:center;gap:7px" title="{{userChipTitle}}"><span style="width:26px;height:26px;border-radius:50%;background:#e3e6eb;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">{{userInitial}}</span><span style="font-size:12.5px">{{userChipName}}</span></div>
      <span class="btn3o" style="{{logoutStyle}}" onClick="{{doLogoutBtn}}">登出</span>
    </div>
  </div>
  <div style="display:flex;flex:1;min-height:0">
    <div class="hnav" style="{{navStyle}}">
      <div class="hgl" style="{{hglStyle}}">營運</div>
      <sc-for list="{{navOps}}" as="nv" hint-placeholder-count="6">
        <div class="hni" style="{{nv.style}}" onClick="{{nv.go}}" title="{{nv.label}}"><span class="msi" style="{{nv.icoStyle}}">{{nv.icon}}</span><span class="lbl" style="{{navLblStyle}}">{{nv.label}}</span><span class="tag3" style="{{nv.badgeStyle}}">{{nv.badge}}</span></div>
      </sc-for>
      <div class="hgl" style="{{hglStyle}}">主資料</div>
      <sc-for list="{{navMaster}}" as="nv" hint-placeholder-count="3">
        <div class="hni" style="{{nv.style}}" onClick="{{nv.go}}" title="{{nv.label}}"><span class="msi" style="{{nv.icoStyle}}">{{nv.icon}}</span><span class="lbl" style="{{navLblStyle}}">{{nv.label}}</span><span class="tag3" style="{{nv.badgeStyle}}">{{nv.badge}}</span></div>
      </sc-for>
      <div class="hgl" style="{{hglStyle}}">分析</div>
      <sc-for list="{{navAna}}" as="nv" hint-placeholder-count="2">
        <div class="hni" style="{{nv.style}}" onClick="{{nv.go}}" title="{{nv.label}}"><span class="msi" style="{{nv.icoStyle}}">{{nv.icon}}</span><span class="lbl" style="{{navLblStyle}}">{{nv.label}}</span><span class="tag3" style="{{nv.badgeStyle}}">{{nv.badge}}</span></div>
      </sc-for>
      <div style="flex:1"></div>
      <div class="hni" style="{{navFoldBtnStyle}}" onClick="{{toggleNav}}" title="{{navFoldTitle}}"><span class="msi">{{navFoldIcon}}</span><span class="lbl" style="{{navLblStyle}}">收合選單</span></div>
    </div>
    <div style="flex:1;overflow:auto;padding:18px;min-width:0" data-screen-label="主內容">

      <!-- ═══ 營運總覽 ═══ -->
      <sc-if value="{{isOverview}}" hint-placeholder-val="{{true}}">
        <div style="display:flex;flex-direction:column;gap:14px" data-screen-label="營運總覽">
          <div style="display:flex;gap:14px">
            <div class="kpi3"><div class="l">今日銷售</div><div class="v">{{kSales}}</div><div class="d">{{kSalesD}}</div></div>
            <div class="kpi3"><div class="l">今日入庫 / 計畫</div><div class="v">{{kBaked}} <span style="font-size:14px;font-weight:400;color:#66707f">/ {{kPlanned}} 個</span></div><div class="d">完成過帳自動累計</div></div>
            <div class="kpi3"><div class="l">在製 WIP</div><div class="v">{{kWip}}</div><div class="d">{{kWipD}}</div></div>
            <div class="kpi3" style="{{costColStyle}}"><div class="l">本日損耗率</div><div class="v" style="color:#c11f28">{{kWasteRate}}</div><div class="d">報廢 ÷(銷貨+報廢)成本</div></div>
          </div>
          <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:14px">
            <div class="pan">
              <div class="pah">缺料預警(排程需求+安全庫存)</div>
              <table class="t3">
                <tr><th>原料</th><th class="num">即時庫存</th><th class="num">排程需求</th><th class="num">缺口</th><th>原因</th><th></th></tr>
                <sc-for list="{{lowRows}}" as="r" hint-placeholder-count="2">
                  <tr><td style="font-weight:500">{{r.name}}</td><td class="num">{{r.stockTxt}}</td><td class="num">{{r.needTxt}}</td><td class="num" style="color:#c11f28;font-weight:600">{{r.gapTxt}}</td><td><span class="tag3" style="{{r.tagStyle}}">{{r.tagTxt}}</span></td><td style="text-align:right"><span class="btn3" onClick="{{r.go}}">{{r.btnTxt}}</span></td></tr>
                </sc-for>
              </table>
              <div style="padding:9px 16px;font-size:11.5px;color:#66707f;border-top:1px solid #eef0f3">{{lowNote}}</div>
            </div>
            <div class="pan">
              <div class="pah">生產狀態</div>
              <table class="t3">
                <tr><th>單號</th><th>產品</th><th class="num">數量</th><th>日期</th><th>狀態</th></tr>
                <sc-for list="{{prodRows}}" as="r" hint-placeholder-count="4">
                  <tr><td style="color:#66707f">{{r.id}}</td><td style="font-weight:500">{{r.name}}</td><td class="num">{{r.qty}}</td><td style="color:#66707f;font-size:11.5px">{{r.dates}}</td><td><span class="tag3" style="{{r.tagStyle}}">{{r.tag}}</span></td></tr>
                </sc-for>
              </table>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
            <div class="pan">
              <div class="pah">前台待售即時(帳上成品)</div>
              <sc-for list="{{saleBars}}" as="b" hint-placeholder-count="5">
                <div style="display:flex;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid #eef0f3;font-size:12.5px">
                  <span style="width:76px;flex:none;font-weight:500">{{b.name}}</span>
                  <div class="bar3"><i style="{{b.barStyle}}"></i></div>
                  <span style="width:84px;text-align:right;font-variant-numeric:tabular-nums">{{b.txt}}</span>
                  <span style="width:60px"><span class="tag3" style="{{b.tagStyle}}">{{b.tagTxt}}</span></span>
                </div>
              </sc-for>
            </div>
            <div class="pan">
              <div class="pah">今日銷售明細(最近)</div>
              <table class="t3">
                <tr><th>單號</th><th>內容</th><th class="num">金額</th></tr>
                <sc-for list="{{recentRows}}" as="r" hint-placeholder-count="4">
                  <tr><td style="color:#66707f">{{r.id}}</td><td>{{r.txt}}</td><td class="num">{{r.amt}}</td></tr>
                </sc-for>
              </table>
            </div>
          </div>
        </div>
      </sc-if>

      <!-- ═══ 每日排程 ═══ -->
      <sc-if value="{{isSchedule}}" hint-placeholder-val="{{false}}">
        <div style="display:grid;grid-template-columns:430px 1fr;gap:14px;align-items:start" data-screen-label="每日排程">
          <div style="display:flex;flex-direction:column;gap:14px">
            <div class="pan">
              <div class="pah">① 生產計畫<span style="margin-left:auto"><span class="btn3" onClick="{{makeOrders}}">一鍵轉生產單</span></span></div>
              <table class="t3">
                <tr><th>產品</th><th class="num">數量</th><th>目標完成</th><th>負責</th><th></th></tr>
                <sc-for list="{{planRows}}" as="r" hint-placeholder-count="3">
                  <tr><td style="font-weight:500">{{r.name}} <span class="tag3" style="{{r.nameTagStyle}}">{{r.nameTag}}</span></td>
                    <td class="num"><input class="inp" style="width:58px;text-align:right" type="number" value="{{r.qtyVal}}" onChange="{{r.onQty}}"></td>
                    <td><span class="inp" style="cursor:pointer;user-select:none;white-space:nowrap" onClick="{{r.openPicker}}">{{r.targetTxt}} ▾</span></td>
                    <td><span class="inp" style="max-width:96px;display:inline-flex;gap:5px;align-items:center;cursor:pointer;background:#fff;user-select:none" onClick="{{r.whoBtn.open}}"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{r.whoBtn.txt}}</span><span style="color:#66707f;font-size:9px;flex:none">▾</span></span></td>
                    <td style="color:#66707f;cursor:pointer" onClick="{{r.remove}}">✕</td></tr>
                </sc-for>
              </table>
              <div style="{{cfgWarnStyle}}">{{cfgWarnTxt}}</div>
              <div style="display:flex;gap:8px;padding:10px 16px;border-top:1px solid #eef0f3;align-items:center">
                <span class="inp" style="min-width:130px;display:inline-flex;gap:5px;align-items:center;cursor:pointer;background:#fff;user-select:none" onClick="{{planBtn.open}}"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{planBtn.txt}}</span><span style="color:#66707f;font-size:9px;flex:none">▾</span></span>
                <input class="inp" style="width:58px;text-align:right" type="number" value="{{planQty}}" onChange="{{onPlanQty}}">
                <span class="inp" style="cursor:pointer;user-select:none;white-space:nowrap" onClick="{{newPicker.openPicker}}">{{newPicker.targetTxt}} ▾</span>
                <span class="btn3o" onClick="{{addPlan}}">+ 加入</span>
              </div>
              <div style="padding:0 16px 10px;font-size:11.5px;color:#66707f">點「今日 16:30 ▾」開啟選擇面板(今日/明日/後天+時間);改動即時重算需求與甘特</div>
            </div>
            <div class="pan">
              <div class="pah">② 需求展開(計畫 × 配方)</div>
              <table class="t3">
                <tr><th>原料</th><th class="num">需求</th><th class="num">庫存</th><th class="num">缺口</th><th></th><th></th></tr>
                <sc-for list="{{mrpRows}}" as="r" hint-placeholder-count="4">
                  <tr><td style="font-weight:500">{{r.name}}</td><td class="num">{{r.needTxt}}</td><td class="num">{{r.stockTxt}}</td><td class="num" style="{{r.gapStyle}}">{{r.gapTxt}}</td><td><span class="tag3" style="{{r.tagStyle}}">{{r.tagTxt}}</span></td><td style="text-align:right"><span class="btn3o" style="{{r.actStyle}}" onClick="{{r.onAct}}">{{r.actTxt}}</span></td></tr>
                </sc-for>
              </table>
              <div style="padding:9px 16px;font-size:11.5px;color:#66707f;border-top:1px solid #eef0f3">48h 品項今日投料、明日出爐,原料需求計入今日;缺口項目點「轉叫貨」帶入「叫貨與採購」的叫貨單</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:14px;min-width:0">
            <div class="pan">
              <div class="pah">③ 逆推排程 — 設備甘特<span style="font-weight:400;color:#66707f;font-size:12px">({{ganttRangeTxt}})</span>
                <span style="margin-left:auto;display:flex;gap:6px;align-items:center;font-weight:400">
                  <span style="font-size:12px;color:#66707f">拖曳平移</span>
                  <span class="btn3o" onClick="{{gZoomOut}}">−</span>
                  <span style="font-size:12px;color:#66707f;min-width:26px;text-align:center">{{gZoomTxt}}</span>
                  <span class="btn3o" onClick="{{gZoomIn}}">+</span>
                </span>
              </div>
              <div style="padding:12px 16px 4px">
               <div ref="{{ganttRef}}" onMouseDown="{{ganttPan}}" style="overflow-x:auto;padding-bottom:6px;cursor:grab;user-select:none">
                <div style="{{ganttInnerStyle}}">
                <div style="display:flex;font-size:10px;color:#66707f">
                  <span style="width:110px;flex:none;position:sticky;left:0;background:#fff;z-index:2;align-self:stretch"></span>
                  <sc-for list="{{ganttTicks}}" as="tk" hint-placeholder-count="8"><span style="{{tk.style}}">{{tk.lbl}}</span></sc-for>
                </div>
                <sc-for list="{{ganttLanes}}" as="ln" hint-placeholder-count="3">
                  <div style="display:flex;align-items:center">
                    <span style="width:110px;flex:none;font-size:11.5px;color:#66707f;position:sticky;left:0;background:#fff;z-index:2;box-sizing:border-box;padding-right:6px;align-self:stretch;display:flex;align-items:center">{{ln.label}}</span>
                    <div class="grow" style="{{ln.laneStyle}}"><sc-for list="{{ln.bars}}" as="b"><div style="{{b.style}}">{{b.label}}</div></sc-for></div>
                  </div>
                </sc-for>
                </div>
               </div>
              </div>
              <div style="{{conflictStyle}}">{{conflictMsg}}</div>
            </div>
            <div class="pan">
              <div class="pah">④ 逆推投料時間表(給後廚)</div>
              <table class="t3">

              </sc-for>
            </table>
          </div>
          <div style="display:flex;flex-direction:column;gap:14px">
            <div class="pan">
              <div class="pah" style="font-size:13px">{{selName}} — 流水<span style="margin-left:auto;font-weight:400;font-size:12px;color:#66707f">結存 {{selStockTxt}}{{selPkgTxt}}</span></div>
              <table class="t3">
                <tr><th>日期</th><th>來源</th><th class="num">異動</th><th class="num">結存</th></tr>
                <sc-for list="{{ledgerRows}}" as="l" hint-placeholder-count="5">
                  <tr><td style="color:#66707f">{{l.date}}</td><td style="font-size:11.5px">{{l.src}}</td><td class="num" style="{{l.qtyStyle}}">{{l.qtyTxt}}</td><td class="num">{{l.balTxt}}</td></tr>
                </sc-for>
              </table>

            <div class="pan" style="{{rsPanStyle}}">

      <!-- ═══ 叫貨與採購(中央倉模式) ═══ -->
      <sc-if value="{{isPurchase}}" hint-placeholder-val="{{false}}">

            <span class="seg"><span style="{{puStoreStyle}}" onClick="{{goPuStore}}">① 門市叫貨</span><span style="{{puCentralStyle}}" onClick="{{goPuCentral}}">② 中央倉出貨{{puCenBadge}}</span><span style="{{puBuyStyle}}" onClick="{{goPuBuy}}">③ 中央採購(供應商){{puBuyBadge}}</span></span>
            <span style="font-size:11.5px;color:#66707f">{{puHintTxt}}</span>
          </div>

              <div style="display:flex;flex-direction:column;gap:14px">
                <div class="pan">
                  <div class="pah">叫貨建議(排程缺口+安全庫存)</div>

                    <tr><th>原料</th><th>原因</th><th>建議叫貨</th><th></th></tr>
                    <sc-for list="{{tsSugRows}}" as="r" hint-placeholder-count="2">
                      <tr><td style="font-weight:500">{{r.name}}<div style="font-size:10.5px;color:#66707f;font-weight:400">{{r.sub}}</div></td><td><span class="tag3" style="{{r.whyStyle}}">{{r.why}}</span></td><td style="font-size:12.5px"><span style="white-space:nowrap">{{r.sugTxt}}</span><div style="font-size:11px;color:#66707f;font-weight:400;white-space:normal;text-wrap:pretty">{{r.sugSub}}</div></td><td style="text-align:right"><span class="btn3o" style="white-space:nowrap" onClick="{{r.onAdd}}">{{r.btnTxt}}</span></td></tr>
                    </sc-for>
                  </table>
                  <div style="{{tsSugEmpty}}">無缺料 — 庫存與在途皆高於安全庫存與排程需求</div>
                  <div style="padding:9px 16px;font-size:11.5px;color:#66707f;border-top:1px solid #eef0f3">門市↔中央一律<b>整包</b>進出(袋/箱/瓶,不走散裝):建議與送出都自動進位到整包;缺 5g 也是叫 1 包。自製半成品以 g 計(中央有備可叫貨,沒備走「排入生產」);建議量已扣「已叫未收」在途</div>
                </div>

                  <div class="pah">叫貨單(草稿)— 向{{centralName}}

                      <span class="btn3" onClick="{{tsSubmit}}">送出叫貨</span>
                    </span>
                  </div>

                  <div style="{{tsTypeTabsStyle}}"><span class="seg"><span style="{{tsTypeRawStyle}}" onClick="{{goTsTypeRaw}}">原料</span><span style="{{tsTypeSemiStyle}}" onClick="{{goTsTypeSemi}}">半成品</span><span style="{{tsTypeProdStyle}}" onClick="{{goTsTypeProd}}">成品</span></span></div>
                  <table class="t3">
                    <tr><th>原料</th><th class="num">數量</th><th>單位</th><th></th></tr>
                    <sc-for list="{{tsDraftRows}}" as="r" hint-placeholder-count="1">
                      <tr><td style="font-weight:500">{{r.name}}<div style="font-size:10.5px;color:#66707f;font-weight:400">{{r.sub}}</div></td>
                        <td class="num"><input class="inp" style="width:80px;text-align:right" type="number" value="{{r.qtyVal}}" onChange="{{r.onQty}}"></td>
                        <td style="color:#66707f;font-size:11.5px">{{r.unit}}</td>
                        <td style="color:#66707f;cursor:pointer;text-align:right" onClick="{{r.onRemove}}">✕</td></tr>
                    </sc-for>
                  </table>
                  <div style="display:flex;gap:8px;padding:10px 16px;border-top:1px solid #eef0f3;align-items:center">
                    <span class="inp" style="flex:1;min-width:0;display:inline-flex;gap:5px;align-items:center;cursor:pointer;background:#fff;user-select:none" onClick="{{tsIngBtn.open}}"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{tsIngBtn.txt}}<span style="color:#9aa1ab;font-size:11px">{{tsIngBtn.meta}}</span></span><span style="color:#66707f;font-size:9px;flex:none">▾</span></span>
                    <input class="inp" style="width:64px;text-align:right" type="number" value="{{tsAddQty}}" onChange="{{onTsAddQty}}">
                    <span style="font-size:11.5px;color:#66707f;flex:none;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{tsAddUnit}}</span>
                    <span class="btn3o" onClick="{{tsAddLine}}">+ 加入</span>
                  </div>
                  <div style="padding:0 16px 10px;font-size:11.5px;color:#66707f">數量以基本單位(g/ml)填寫,外購原料<b>送出時自動進位到整包</b>(右側顯示折合包數);自製半成品以 g 計。送出後到「② 中央倉出貨」出貨,再回此頁「確認收貨」入門市庫存</div>
                </div>
              </div>
              <div class="pan">
                <div class="pah">我的叫貨單({{locShort}})</div>
                <div style="padding:12px;display:flex;flex-direction:column;gap:10px">

                    <div class="task3">
                      <div style="display:flex;align-items:center;gap:8px"><b>{{t.id}}</b><span class="tag3" style="{{t.tagStyle}}">{{t.tag}}</span><span class="tag3" style="{{t.needStyle}}">{{t.needTag}}</span><span style="color:#66707f;font-size:11.5px;margin-left:auto">{{t.dateTxt}}</span></div>
                      <div style="color:#66707f;font-size:11.5px;margin-top:5px">{{t.txt}}</div>
                      <div style="display:flex;gap:8px;margin-top:8px">
                        <span class="btn3" style="{{t.recvStyle}}" onClick="{{t.doRecv}}">確認收貨(入門市庫存)</span>
                        <span class="btn3o" style="{{t.cancelStyle}}" onClick="{{t.doCancel}}">取消叫貨</span>
                      </div>
                    </div>
                  </sc-for>
                  <div style="{{tsMyEmpty}}">尚無叫貨紀錄 — 左側從建議或手動加入後送出</div>
                </div>
              </div>
            </div>
          </sc-if>

          <!-- ② 中央倉出貨 -->
          <sc-if value="{{puCentralOn}}" hint-placeholder-val="{{false}}">
            <div style="display:grid;grid-template-columns:1fr 360px;gap:14px;align-items:start">
              <div class="pan">
                <div class="pah">待出貨叫貨單(各門市 → {{centralName}})<span style="margin-left:auto;font-size:12px;font-weight:400;color:#66707f">排序:急件優先 → 需求到貨日</span></div>
                <div style="padding:12px;display:flex;flex-direction:column;gap:10px">
                  <sc-for list="{{tcPending}}" as="t" hint-placeholder-count="1">
                    <div class="task3">
                      <div style="display:flex;align-items:baseline;gap:8px"><b style="font-size:13.5px">{{t.id}}</b><span class="tag3" style="{{t.storeStyle}}">{{t.store}}</span><span class="tag3" style="{{t.prioStyle}}">{{t.prioTag}}</span><span style="color:#66707f;font-size:11.5px">叫貨 {{t.date}}</span></div>
                      <table class="t3" style="margin-top:8px">
                        <tr><th>原料</th><th class="num">叫貨量</th><th class="num">中央庫存</th><th>檢查</th></tr>
                        <sc-for list="{{t.lines}}" as="l"><tr><td style="font-weight:500">{{l.name}}<div style="font-size:10.5px;color:#66707f;font-weight:400">{{l.sub}}</div></td><td class="num">{{l.qtyTxt}}</td><td class="num">{{l.stockTxt}}</td><td><span class="tag3" style="{{l.okStyle}}">{{l.okTxt}}</span></td></tr></sc-for>
                      </table>
                      <div style="display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap">
                        <span class="btn3" style="{{t.shipStyle}}" onClick="{{t.doShip}}">全量出貨(扣中央庫存)</span>
                        <span class="btn3o" style="{{t.partStyle}}" onClick="{{t.doPart}}">部分出貨(短缺分配)</span>

                      </div>
                    </div>

              <div style="display:flex;flex-direction:column;gap:14px">

                      <tr><td style="font-weight:500">{{r.name}}<div style="font-size:10.5px;color:#66707f;font-weight:400">{{r.sub}}</div></td><td class="num">{{r.stockTxt}}</td><td class="num">{{r.needTxt}}</td><td><span class="tag3" style="{{r.tagStyle}}">{{r.tagTxt}}</span></td></tr>
                    </sc-for>
                  </table>

                </div>
              </div>
            </div>

                  <sc-for list="{{sugRows}}" as="r" hint-placeholder-count="2">

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;color:#66707f;min-width:0">名稱<input class="inp" style="width:100%;min-width:0;box-sizing:border-box;font-weight:600" value="{{r.nameVal}}" onChange="{{r.onName}}"></label>
                      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;color:#66707f;min-width:0">聯絡人<input class="inp" style="width:100%;min-width:0;box-sizing:border-box" placeholder="人名" value="{{r.personVal}}" onChange="{{r.onPerson}}"></label>
                      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;color:#66707f;min-width:0">電話<input class="inp" style="width:100%;min-width:0;box-sizing:border-box" placeholder="02-xxxx-xxxx" value="{{r.phoneVal}}" onChange="{{r.onPhone}}"></label>
                      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;color:#66707f;min-width:0">Email<input class="inp" style="width:100%;min-width:0;box-sizing:border-box" placeholder="name@example.com" value="{{r.emailVal}}" onChange="{{r.onEmail}}"></label>
                      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;color:#66707f;min-width:0">付款方式<input class="inp" style="width:100%;min-width:0;box-sizing:border-box" placeholder="月結 30 天" value="{{r.termsVal}}" onChange="{{r.onTerms}}"></label>
                      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;color:#66707f;min-width:0">地址<input class="inp" style="width:100%;min-width:0;box-sizing:border-box" placeholder="送貨/發票地址" value="{{r.addrVal}}" onChange="{{r.onAddr}}"></label>
                    </div>
                  </div>
                </div>
              </sc-for>
            </div>
            <div style="padding:8px 16px;font-size:11.5px;color:#66707f">點欄名排序(↑↓,再點一次還原);點列展開編輯,直接改即存檔。被原料設為預設供應商時不可刪除。</div>
          </div>
          <div class="pan">
            <div class="pah">設備產能(排程負載檢查依據)<span class="btn3" style="margin-left:auto" onClick="{{addEq}}">+ 新增</span></div>
            <table class="t3" style="table-layout:fixed">
              <tr>
                <th style="width:24%;padding:7px 6px 7px 16px">設備</th>
                <th style="width:21%;padding:7px 6px">類型</th>
                <th class="num" style="width:13%;padding:7px 6px">數量</th>
                <th style="width:21%;padding:7px 6px">單批容量</th>
                <th class="num" style="padding:7px 6px;white-space:nowrap">工時(分)</th>
                <th style="width:34px"></th>
              </tr>
              <sc-for list="{{eqRows}}" as="r" hint-placeholder-count="3">
                <tr>
                  <td style="padding:8px 6px 8px 16px"><input class="inp" style="width:100%;font-weight:500" value="{{r.nameVal}}" onChange="{{r.onName}}"></td>
                  <td style="padding:8px 6px"><span class="inp" style="width:100%;box-sizing:border-box;display:inline-flex;gap:5px;align-items:center;cursor:pointer;background:#fff;user-select:none" onClick="{{r.typeBtn.open}}"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{r.typeBtn.txt}}</span><span style="color:#66707f;font-size:9px;flex:none">▾</span></span></td>
                  <td style="padding:8px 6px"><input class="inp" style="width:100%;text-align:right" type="number" value="{{r.cntVal}}" onChange="{{r.onCnt}}"></td>
                  <td style="padding:8px 6px"><input class="inp" style="width:100%" value="{{r.capVal}}" onChange="{{r.onCap}}"></td>
                  <td style="padding:8px 6px"><input class="inp" style="width:100%;text-align:right" type="number" value="{{r.minVal}}" onChange="{{r.onMin}}"></td>
                  <td style="padding:8px 14px 8px 4px;color:#c11f28;cursor:pointer;text-align:right;font-weight:600" onClick="{{r.onDel}}">✕</td>
                </tr>
              </sc-for>
            </table>
            <div style="padding:10px 16px;font-size:11.5px;color:#66707f;border-top:1px solid #eef0f3;line-height:1.8">
              <b style="color:#1b2330">數量</b> — 同型設備幾台。例:烤爐 ×2 = 同一時段最多同時烤 2 批;排程甘特超過台數就會亮紅色衝突警告。<br>
              <b style="color:#1b2330">單批容量</b> — 一次能塞多少:烤爐/發酵箱填「幾盤」、攪拌機填「最大麵團 kg」。生產量超過容量時,代表要拆批或分次進爐(目前為人工判斷參考)。<br>
              <b style="color:#1b2330">工時(分)</b> — 這台設備跑完一輪的分鐘數:烤爐=一爐的烘烤時間、攪拌機=一缸的攪拌時間。<b style="color:#1b2330">發酵箱留空</b>,因為發酵時間由各產品的工序(一發/二發/冷藏發酵)決定,不是設備固定值。<br>
              被工序引用中的設備不可刪除。
            </div>
          </div>
        </div>
      </sc-if>

      <!-- ═══ 報表 ═══ -->
      <sc-if value="{{isReports}}" hint-placeholder-val="{{false}}">
        <div style="display:flex;flex-direction:column;gap:14px" data-screen-label="報表">
          <div style="display:flex;gap:14px">
            <div class="kpi3"><div class="l">近 7 日營收({{rRangeTxt}})</div><div class="v">{{rRev}}</div><div class="d">{{rMarginPct}}</div></div>
            <div class="kpi3" style="{{costColStyle}}"><div class="l">原料成本</div><div class="v">{{rCost}}</div><div class="d">依配方 × 最新單價</div></div>
            <div class="kpi3" style="{{costColStyle}}"><div class="l">毛利</div><div class="v">{{rMargin}}</div><div class="d">營收 − 原料成本</div></div>
            <div class="kpi3" style="{{costColStyle}}"><div class="l">損耗率</div><div class="v" style="color:#c11f28">{{rWasteRate}}</div><div class="d">報廢成本 / 生產成本</div></div>
          </div>
          <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:14px;align-items:start">
            <div class="pan">
              <div class="pah">產品毛利排行(週)</div>
              <table class="t3">
                <tr><th>產品</th><th class="num">銷量</th><th class="num">營收</th><th class="num" style="{{costColStyle}}">成本</th><th class="num" style="{{costColStyle}}">毛利</th><th class="num" style="{{costColStyle}}">毛利率</th></tr>
                <sc-for list="{{marginRows}}" as="r" hint-placeholder-count="5">
                  <tr><td style="font-weight:500">{{r.name}}</td><td class="num">{{r.qty}}</td><td class="num">{{r.rev}}</td><td class="num" style="{{costColStyle}}">{{r.cost}}</td><td class="num" style="font-weight:600;{{costColStyle}}">{{r.mg}}</td><td class="num" style="{{r.pctStyle}};{{costColStyle}}">{{r.pct}}</td></tr>
                </sc-for>
              </table>
            </div>
            <div class="pan">
              <div class="pah">損耗分析(依原因,週)</div>
              <div style="padding:12px 16px;display:flex;flex-direction:column;gap:9px;font-size:12.5px">
                <sc-for list="{{wasteBars}}" as="b" hint-placeholder-count="2">
                  <div style="display:flex;align-items:center;gap:10px"><span style="width:64px;flex:none">{{b.reason}}</span><div class="bar3"><i style="{{b.barStyle}}"></i></div><span style="width:72px;text-align:right">{{b.amt}}</span></div>
                </sc-for>
              </div>
              <div style="padding:8px 16px;font-size:11.5px;color:#66707f;border-top:1px solid #eef0f3">來源:waste 表 × 產品單位成本;日結報廢會即時反映在此</div>
            </div>
          </div>
        </div>
      </sc-if>

      <!-- ═══ 日結 ═══ -->
      <sc-if value="{{isClosing}}" hint-placeholder-val="{{false}}">
        <div style="display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start" data-screen-label="日結">
          <div class="pan">
            <div class="pah">① 剩餘成品處置(帳上餘量自動帶出)<span class="tag3" style="{{closedStyle}}">{{closedTag}}</span></div>
            <table class="t3">
              <tr><th>成品</th><th class="num">帳上餘量</th><th>處置</th><th class="num">影響</th></tr>
              <sc-for list="{{closeRows}}" as="r" hint-placeholder-count="3">
                <tr><td style="font-weight:500">{{r.name}}</td><td class="num">{{r.qty}}</td>
                  <td><span class="seg"><sc-for list="{{r.segs}}" as="s"><span style="{{s.style}}" onClick="{{s.onPick}}">{{s.lbl}}</span></sc-for></span></td>
                  <td class="num" style="color:#66707f;font-size:11.5px">{{r.costTxt}}</td></tr>
              </sc-for>
            </table>
            <div style="{{closeEmpty}}">帳上已無剩餘成品(皆已售出/處置)</div>
            <div style="padding:9px 16px;font-size:11.5px;color:#66707f;border-top:1px solid #eef0f3">報廢 → 寫入報廢+出庫流水;員工價 → 以半價寫入銷售;留存 → 明日續售。生產損耗已於「完成入庫」時記錄。</div>
          </div>
          <div class="pan">
            <div class="pah" style="font-size:13px">② 今日結算摘要</div>
            <table class="t3">
              <tr><td>銷售收入</td><td class="num" style="font-weight:600">{{cSales}}</td></tr>
              <sc-if value="{{canCost}}">
              <tr><td>銷貨成本</td><td class="num">{{cCogs}}</td></tr>
              <tr><td>毛利</td><td class="num" style="font-weight:600;color:#177a4c">{{cMargin}}</td></tr>
              <tr><td style="color:#c11f28">報廢損耗(今日累計)</td><td class="num" style="color:#c11f28">{{cWaste}}</td></tr>
              <tr><td style="font-weight:600">日淨毛利</td><td class="num" style="font-weight:700">{{cNet}}</td></tr>
              </sc-if>
            </table>
            <div style="padding:12px">
              <span class="btn3" style="display:block;text-align:center;padding:11px 0;font-size:14px" onClick="{{doClose}}">確認日結並過帳</span>
              <div style="font-size:11px;color:#66707f;margin-top:8px">過帳後寫入報廢/銷售流水(不可改,只能沖銷);報表與總覽即時更新</div>
            </div>
          </div>
        </div>
      </sc-if>

      <!-- ═══ 開始設定(建置嚮導) ═══ -->
      <sc-if value="{{isSetup}}" hint-placeholder-val="{{false}}">
        <div style="display:grid;grid-template-columns:1fr 320px;gap:14px;align-items:start" data-screen-label="開始設定">
          <div class="pan">
            <div class="pah">系統建置嚮導 — 依序完成<span class="tag3" style="color:#0e7490;border-color:#0e7490;margin-left:auto">{{setupProg}}</span></div>
            <sc-for list="{{setupSteps}}" as="s" hint-placeholder-count="8">
              <div style="{{s.rowStyle}}">
                <span style="{{s.numStyle}}">{{s.no}}</span>
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600">{{s.title}}</div>
                  <div style="font-size:11.5px;color:#66707f;margin-top:2px">{{s.desc}}</div>
                </div>
                <span class="tag3" style="{{s.tagStyle}};flex:none">{{s.tagTxt}}</span>
                <span class="btn3o" style="flex:none" onClick="{{s.go}}">{{s.btnTxt}}</span>
              </div>
            </sc-for>
            <div style="padding:10px 16px;font-size:11.5px;color:#66707f">完成狀態由資料自動偵測(例:原料表有資料 → 步驟 3 打勾);清空示範資料前,步驟 3–11 不會顯示完成。藍【中央】/橘【門市】= 該步驟的操作視角。</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:14px">
            <div class="pan">
              <div class="pah" style="font-size:13px">建置完成後 — 每日循環</div>
              <table class="t3">
                <tr><td style="color:#66707f;width:52px">前一晚</td><td>每日排程:輸入明日品項/數量 → 缺料轉採購 → 轉生產單</td></tr>
                <tr><td style="color:#66707f">清晨</td><td>生產管理:依投料時間投料過帳(自動扣原料)</td></tr>
                <tr><td style="color:#66707f">出爐</td><td>完成入庫:填實際數量(差額自動記生產損耗)</td></tr>
                <tr><td style="color:#66707f">營業中</td><td>前台銷售:點磁磚結帳,自動扣成品、看補貨倒數</td></tr>
                <tr><td style="color:#66707f">打烊</td><td>日結:剩餘成品選報廢/留存/員工價 → 確認過帳</td></tr>
                <tr><td style="color:#66707f">每週</td><td>報表:毛利排行、損耗原因、呆滯料 → 調整計畫量</td></tr>
              </table>
            </div>
            <div class="pan">
              <div class="pah" style="font-size:13px">三個關鍵觀念</div>
              <div style="padding:12px 16px;font-size:12px;color:#66707f;line-height:1.8">
                <b style="color:#1b2330">庫存不可手改</b> — 一切數字由流水帳彙總;差異走「盤點」。<br>
                <b style="color:#1b2330">配方是橋樑</b> — 投料自動扣原料、成本毛利自動算,配方越準帳越準。<br>
                <b style="color:#1b2330">48h 品項提前想</b> — 排程會把發酵品的原料需求自動提前計入。
              </div>
            </div>
          </div>
        </div>
      </sc-if>

      <!-- ═══ 資料連線 ═══ -->
      <sc-if value="{{isConnect}}" hint-placeholder-val="{{false}}">
        <div style="display:grid;grid-template-columns:1fr 320px;gap:14px;align-items:start" data-screen-label="資料連線">
          <div style="display:flex;flex-direction:column;gap:14px">
            <div class="pan">
              <div class="pah">方案 A|Sheets API 直連(已帶入你的金鑰)</div>
              <div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px;font-size:12.5px">
                <div style="display:grid;grid-template-columns:118px 1fr;gap:8px;align-items:center">
                  <span style="color:#66707f">試算表 ID</span><input class="inp" value="{{sidVal}}" onChange="{{onSid}}">
                  <span style="color:#66707f">API Key</span><input class="inp" value="{{gKeyVal}}" onChange="{{onGKey}}">
                  <span style="color:#66707f">OAuth Client ID</span><input class="inp" value="{{gCidVal}}" onChange="{{onGCid}}">
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                  <span class="btn3o" style="{{connBusyStyle}}" onClick="{{gLogin}}">① Google 登入授權(寫入用)</span>
                  <span class="btn3o" style="{{connBusyStyle}}" onClick="{{gInit}}">② 初始化:建分頁+上傳目前資料</span>
                  <span class="btn3" style="{{connBusyStyle}}" onClick="{{gConnect}}">③ 連線並載入</span>
                </div>
                <div style="font-size:11.5px;color:#66707f">讀取:Sheet 已開「知道連結者可檢視」時,用 API Key 即可。寫入:需步驟 ① 授權;若跳出 origin 錯誤,到 GCP「已授權的 JavaScript 來源」加入本頁網域,或改用方案 B。</div>
              </div>
            </div>
            <div class="pan">
              <div class="pah">方案 B|Apps Script 極薄後端(免金鑰、免 origin 設定,較穩)</div>
              <div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px;font-size:12.5px">
                <div style="display:flex;gap:8px;align-items:center">
                  <span style="color:#66707f;flex:none">/exec 網址</span>
                  <input class="inp" style="flex:1" placeholder="https://script.google.com/macros/s/…/exec" value="{{gasUrlVal}}" onChange="{{onGasUrl}}">
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                  <span class="btn3o" style="{{connBusyStyle}}" onClick="{{gasTest}}">① 測試連線</span>
                  <span class="btn3o" style="{{connBusyStyle}}" onClick="{{gasMigrate}}" title="只補缺少的分頁與欄位,現有資料全部保留">② 升級結構(保留資料)</span>
                  <span class="btn3" style="{{connBusyStyle}}" onClick="{{gasConnect}}">③ 連線並載入</span>
                  <span class="btn3o" style="color:#c11f28;border-color:#dfb9bb;{{connBusyStyle}}" onClick="{{gasInit}}" title="⚠ 全部分頁清空重建為示範資料 — 現有資料會刪除,按下會再確認一次">初始化(清空重建)</span>
                </div>
                <table class="t3">
                  <tr><td style="color:#66707f;width:24px">1</td><td><a href="{{sheetUrl}}" target="_blank" style="color:#0e7490">開啟你的 ERP-DB Sheet ↗</a> → 擴充功能 → Apps Script</td></tr>
                  <tr><td style="color:#66707f">2</td><td>清空編輯器,<span style="color:#0e7490;cursor:pointer" onClick="{{copyBackend}}">點此複製後端程式碼(apps-script.js)</span>貼上並儲存</td></tr>
                  <tr><td style="color:#66707f">3</td><td>部署 → 新增部署 → 網頁應用程式(執行身分=我;存取權=任何人)→ 複製 /exec 網址貼回上方</td></tr>
                </table>
              </div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:14px">
            <div class="pan">
              <div class="pah" style="font-size:13px">同步狀態</div>
              <div style="padding:12px 16px;display:flex;flex-direction:column;gap:8px;font-size:12.5px">
                <span class="tag3" style="{{connModeStyle}};align-self:flex-start">{{connModeTxt}}</span>
                <div style="display:flex;gap:8px"><span class="btn3o" style="{{connBusyStyle}}" onClick="{{pullNow}}">重新同步</span><span class="btn3o" onClick="{{goLocalMode}}">切回本地示範</span></div>
                <div style="font-size:11.5px;color:#66707f">連線後每筆過帳即時寫入 Sheet:交易表 append-only、主資料整表覆寫;寫入失敗會跳提示並保留在本地。</div>
              </div>
            </div>
            <div class="pan">
              <div class="pah" style="font-size:13px">資料重置</div>
              <div style="padding:12px 16px;display:flex;flex-direction:column;gap:8px;font-size:12.5px">
                <span class="btn3o" style="color:#c11f28;border-color:#c11f28;text-align:center" onClick="{{onWipeTx}}">{{wipeTxTxt}}</span>
                <span class="btn3o" style="color:#c11f28;border-color:#c11f28;text-align:center" onClick="{{onWipeAll}}">{{wipeAllTxt}}</span>
                <span class="btn3o" style="text-align:center;color:#946800;border-color:#946800" onClick="{{onSeedCloud}}">{{seedCloudTxt}}</span>
                <span class="btn3o" style="text-align:center" onClick="{{doReset}}">還原示範資料(僅本地)</span>
                <div style="font-size:11.5px;color:#66707f">清空會同步覆寫 Sheet(僅留表頭)。要用真實資料:建議「全部清空」→ 原料 → 產品與配方 → 供應商・設備逐一建檔。</div>
              </div>
            </div>
            <div class="pan">
              <div class="pah" style="font-size:13px">資料表(目前載入列數)</div>
              <table class="t3">
                <sc-for list="{{tableRows}}" as="r" hint-placeholder-count="8"><tr><td>{{r.name}}</td><td class="num">{{r.cnt}}</td></tr></sc-for>
              </table>
            </div>
          </div>
        </div>
      </sc-if>

      <!-- ═══ 帳號與角色(super_admin) ═══ -->
      <sc-if value="{{isAccounts}}">
        <div style="display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:14px;align-items:start" data-screen-label="帳號與角色">
          <div class="pan">
            <div class="pah">使用者帳號(user_account)<span style="font-weight:400;color:#66707f;font-size:12px">{{accBusyTxt}}</span><span style="margin-left:auto;display:flex;gap:8px"><span class="btn3o" onClick="{{accReload}}">重新載入</span><span class="btn3" onClick="{{accAdd}}">+ 新增帳號</span></span></div>
            <div style="overflow-x:auto">
            <table class="t3 tacc">
              <tr><th>編號</th><th>姓名</th><th>Email(Google 帳號)</th><th>角色</th><th>門市範圍</th><th>狀態</th><th>最後登入</th><th></th></tr>
              <sc-for list="{{accRows}}" as="r" hint-placeholder-count="3">
                <tr>
                  <td style="color:#66707f">{{r.id}}</td>
                  <td><input class="inp" style="width:74px" value="{{r.nameVal}}" onChange="{{r.onName}}"></td>
                  <td><input class="inp" style="width:158px" value="{{r.emailVal}}" onChange="{{r.onEmail}}"></td>
                  <td><span class="inp" style="min-width:120px;display:inline-flex;gap:5px;align-items:center;cursor:pointer;background:#fff;user-select:none" onClick="{{r.roleBtn.open}}"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{r.roleBtn.txt}}</span><span style="color:#66707f;font-size:9px;flex:none">▾</span></span></td>
                  <td><span class="inp" style="min-width:120px;max-width:180px;display:inline-flex;gap:5px;align-items:center;cursor:pointer;background:#fff;user-select:none" onClick="{{r.locBtn.open}}"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{r.locBtn.txt}}</span><span style="color:#66707f;font-size:9px;flex:none">▾</span></span></td>
                  <td><span class="tag3" style="{{r.actStyle}}" onClick="{{r.onToggle}}">{{r.actTxt}}</span></td>
                  <td style="color:#66707f;font-size:11px;white-space:nowrap">{{r.lastLogin}}</td>
                  <td style="color:#c11f28;cursor:pointer;text-align:right" title="刪除帳號(不能刪自己)" onClick="{{r.onDel}}">✕</td>
                </tr>
              </sc-for>
            </table>
            </div>
            <div style="{{accEmpty}}">尚無帳號 — 按「+ 新增帳號」;第一位管理員由後端 AUTH.BOOTSTRAP_ADMIN 首次登入自動建立</div>
            <div style="padding:9px 16px;font-size:11.5px;color:#66707f;border-top:1px solid #eef0f3">改完自動存檔。Email 須是對方登入用的 Google 帳號;「停用」即刻擋下該帳號所有讀寫。門市範圍點 ALL = 不限;角色/範圍變更,資料層當下生效、畫面於對方下次重新整理生效。</div>
          </div>
          <div class="pan">
            <div class="pah">角色權限矩陣(role_permission)<span style="margin-left:auto;font-weight:400;font-size:11.5px;color:#66707f">super_admin 恆為全部,不在此列</span></div>
            <div style="{{permSeedStyle}}"><span style="flex:1;min-width:0">⚠ 矩陣尚未寫入 Sheet — 系統目前依「內建預設」運作(淡色 ✓ 即預設值)。寫入後才能逐格微調。</span><span class="btn3" style="flex:none;white-space:nowrap" onClick="{{permSeed}}">寫入預設矩陣</span></div>
            <div style="overflow-x:auto">
            <table class="t3">
              <tr><th>權限</th><sc-for list="{{permRoleHead}}" as="h"><th style="text-align:center">{{h}}</th></sc-for></tr>
              <sc-for list="{{permMatrix}}" as="row">
                <tr><td style="font-weight:500">{{row.label}}</td><sc-for list="{{row.cells}}" as="c"><td style="text-align:center"><span class="tag3" style="{{c.style}}" title="{{c.tip}}" onClick="{{c.toggle}}">{{c.txt}}</span></td></sc-for></tr>
              </sc-for>
            </table>
            </div>
            <div style="padding:9px 16px;font-size:11.5px;color:#66707f;border-top:1px solid #eef0f3">點格子切換 ✓/—,自動存檔;也可以直接在 Google Sheet 的 role_permission 分頁編輯,效果相同。「帳號與角色」畫面固定僅 super_admin 可用,不在矩陣內。</div>
          </div>
        </div>
      </sc-if>

    </div>
  </div>
</div>
<div style="{{apBackStyle}}" onClick="{{apClose}}"></div>
<div style="{{apStyle}}">
  <div style="font-size:11px;color:#66707f;margin-bottom:6px">完成日</div>
  <div style="display:flex;gap:6px"><sc-for list="{{apDayChips}}" as="c"><span style="{{c.style}}" onClick="{{c.onPick}}">{{c.lbl}}</span></sc-for></div>
  <div style="font-size:11px;color:#66707f;margin:10px 0 6px">時間</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap"><sc-for list="{{apTimeChips}}" as="c"><span style="{{c.style}}" onClick="{{c.onPick}}">{{c.lbl}}</span></sc-for></div>
  <div style="display:flex;gap:8px;align-items:center;margin-top:10px">
    <input class="inp" style="flex:1" type="time" value="{{apTimeVal}}" onChange="{{apOnTime}}">
    <span class="btn3" onClick="{{apClose}}">確定</span>
  </div>
</div>

<!-- ═══ 全域下拉面板(共用,一次只開一個) ═══ -->
<div style="{{ddBackdrop}}" onClick="{{ddCloseFn}}"></div>
<div style="{{ddPanelStyle}}">
  <input class="inp" id="dd-search" style="{{ddSearchStyle}}" placeholder="搜尋…" value="{{ddSearch}}" onChange="{{onDdSearch}}">
  <div style="max-height:250px;overflow:auto;display:flex;flex-direction:column" onScroll="{{onDdScroll}}">
    <sc-for list="{{ddList}}" as="o" hint-placeholder-count="0">
      <div style="{{o.rowStyle}}" style-hover="background:#eef6f8" onClick="{{o.pick}}"><span class="msi" style="{{o.checkStyle}}">{{o.checkIcon}}</span><span style="flex:1;min-width:0">{{o.name}}</span><span style="color:#9aa1ab;font-size:11px">{{o.meta}}</span></div>
    </sc-for>
    <div style="{{ddMoreStyle}}">{{ddMoreTxt}}</div>
    <div style="{{ddListEmpty}}">沒有符合項目</div>
  </div>
</div>
</sc-if>
<!-- toast 在登入畫面也要能顯示 → 放在 appOn 閘門外 -->
<div style="{{toastStyle}}">{{toast}}</div>
</script>
<script>
  // Google Sheets 連線預設值:部署時由 GitHub Actions 以 repo secrets 取代這些佔位符;
  // 本機開發用 google-config.local.js(gitignored)覆蓋。留空 = 本地示範模式,「資料連線」頁仍可手動填。
  window.BAKERY_CFG = {
    sheetId: '__BAKERY_SHEET_ID__',
    apiKey: '__GOOGLE_API_KEY__',
    clientId: '__GOOGLE_CLIENT_ID__',
    gasUrl: '__BAKERY_GAS_URL__'
  };
</script>
<script src="google-config.local.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
