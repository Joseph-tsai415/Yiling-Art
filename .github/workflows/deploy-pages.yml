name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Inject version from latest git tag
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          echo "Injecting version: $VERSION"
          # Patch __APP_VERSION__ in every app's index.html (one folder per app at repo root).
          grep -rl --include='index.html' --exclude-dir='.git' --exclude-dir='node_modules' '__APP_VERSION__' . | while read -r file; do
            echo "  -> $file"
            sed -i "s/__APP_VERSION__/$VERSION/g" "$file"
          done
      - name: Inject Google API credentials (from repo secrets)
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          f=product-card-printer/index.html
          sed -i "s|__GOOGLE_CLIENT_ID__|${GOOGLE_CLIENT_ID}|g" "$f"
          sed -i "s|__GOOGLE_API_KEY__|${GOOGLE_API_KEY}|g" "$f"
          echo "Injected Google credentials into $f"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
